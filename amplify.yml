# AWS Amplify Hosting — Next.js (SSR + API routes)
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - export NODE_OPTIONS=--max-old-space-size=4096
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        - env | grep -e SUPABASE_SERVICE_ROLE_KEY >> .env.production
        - cat .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
